server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # API et images : proxifiées vers le back (même origine -> pas de CORS)
    location /api/ {
        proxy_pass http://back:8080;
        proxy_set_header Host $host;
    }
    location /images/ {
        proxy_pass http://back:8080;
    }

    # Assets hashés (nom unique par build) : cache long, sans risque de version périmée
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Application Vue (SPA) : tout le reste retombe sur index.html.
    # index.html jamais mis en cache -> le client récupère toujours les derniers assets.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
