server {
    listen 80;
    server_name _;

    # API et images : proxifiées vers le back (même origine -> pas de CORS)
    location /api/ {
        proxy_pass http://back:8080;
        proxy_set_header Host $host;
    }
    location /images/ {
        proxy_pass http://back:8080;
    }

    # Application Vue (SPA) : tout le reste retombe sur index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
