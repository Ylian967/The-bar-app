# ===== Le Bar'app - configuration =====
spring.application.name=barapp

# --- Base de données PostgreSQL ---
# Les valeurs par défaut conviennent en local ; Docker Compose les surcharge via variables d'env.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/barapp}
spring.datasource.username=${DB_USER:barapp}
spring.datasource.password=${DB_PASSWORD:barapp}

# --- JPA / Hibernate ---
# Le schéma est créé par db/init.sql : Hibernate se contente de le valider.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Serveur ---
server.port=8080

# --- Sécurité JWT ---
# La clé doit faire au moins 32 caractères. À surcharger via la variable d'env JWT_SECRET en prod.
jwt.secret=${JWT_SECRET:bar-app-cle-secrete-de-developpement-a-changer-2026}
jwt.expiration-ms=86400000

# --- Front autorisé (CORS) ---
app.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}
